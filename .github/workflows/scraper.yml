name: Tennis Scraper Diario

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4
        with:
          # Token con permisos de escritura para poder hacer push
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias de Python
        run: |
          pip install pandas beautifulsoup4 playwright

      - name: Instalar Chromium y dependencias del sistema
        run: |
          # Usar python -m playwright para garantizar que usa el PATH correcto
          python -m playwright install chromium
          python -m playwright install-deps chromium

      - name: Ejecutar scraper
        run: python scraper.py

      - name: Guardar datos en repositorio
        run: |
          git config --global user.email "scraperbot@github.com"
          git config --global user.name "TennisScraperBot"
          # Solo intenta agregar CSVs si existen
          if ls datos/*.csv 1> /dev/null 2>&1; then
            git add datos/*.csv
          else
            echo "No se encontraron archivos CSV en datos/. Nada que commitear."
            exit 0
          fi
          # Solo hace commit si hay cambios reales; si no, termina sin error
          git diff --staged --quiet && echo "Sin cambios nuevos." || git commit -m "Update tennis data $(date +'%Y-%m-%d')"
          git push
