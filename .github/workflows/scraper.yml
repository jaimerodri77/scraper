name: 🎾 Tennis Scraper Diario

on:
  schedule:
    - cron: '0 8 * * *'   # Corre todos los días a las 8am UTC
  workflow_dispatch:        # También permite ejecución manual

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repositorio
        uses: actions/checkout@v4

      - name: 🐘 Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: curl, dom, json, mbstring

      - name: 🎾 Ejecutar scraper
        run: php scraper/flashscore.php

      - name: 💾 Guardar datos en repositorio
        run: |
          git config --global user.email "scraperbot@github.com"
          git config --global user.name "TennisScraperBot"
          git add datos/
          git diff --staged --quiet || git commit -m "📊 Update tennis data $(date +'%Y-%m-%d %H:%M')"
          git push
