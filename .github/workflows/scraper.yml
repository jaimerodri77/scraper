name: Tennis Scraper Diario

on:
  schedule:
    # 05:01 UTC es igual a 00:01 (12:01 AM) hora Colombia (UTC-5)
    - cron: '1 5 * * *'
  workflow_dispatch: # Permite ejecutarlo manualmente para pruebas

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install pandas playwright playwright-stealth

      - name: Instalar Chromium
        run: |
          python -m playwright install chromium
          python -m playwright install-deps chromium

      - name: Ejecutar scraper diario de partidos
        run: python scraper_diario.py

      - name: Ejecutar scraper de jugadores
        run: python scraper.py

      - name: Extraer calendario de partidos del día
        run: python scraper_calendario.py

      - name: Guardar datos en repositorio
        if: always()
        run: |
          git config --global user.email "scraperbot@github.com"
          git config --global user.name "TennisScraperBot"
          git add datos/*.csv || true
          if git diff --staged --quiet; then
            echo "Sin cambios nuevos."
            exit 0
          fi
          git commit -m "Update tennis daily data $(date +'%Y-%m-%d')"
          git push

