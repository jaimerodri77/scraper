name: Tennis Scraper Diario

on:
  schedule:
    - cron: '1 5 * * *' # 12:01 AM Colombia
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install pandas curl_cffi

      - name: Conectar a VPN (Cloudflare WARP)
        run: |
          curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg | sudo gpg --yes --dearmor --output /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/cloudflare-client.list
          sudo apt-get update && sudo apt-get install -y cloudflare-warp
          warp-cli --accept-tos registration new
          warp-cli --accept-tos connect
          sleep 10
          echo "IP actual (a través de WARP):"
          curl -4 ifconfig.me
      - name: Ejecutar scraper diario de partidos
        run: python scraper_diario.py

      

      - name: Extraer calendario de partidos del día
        run: python scraper_calendario.py

      - name: Guardar datos en repositorio
        if: always()
        run: |
          git config --global user.email "scraperbot@github.com"
          git config --global user.name "TennisScraperBot"
          git add datos/*.csv || true
          if git diff --staged --quiet; then
            echo "Sin cambios nuevos."
            exit 0
          fi
          git commit -m "Daily Update: $(date +'%Y-%m-%d')"
          # Sincronizar con el repo antes de subir para evitar conflictos con el bot histórico
          git pull --rebase origin main
          git push







