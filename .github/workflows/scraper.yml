name: Tennis Scraper Diario

on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install pandas beautifulsoup4 playwright

      - name: Instalar Chromium
        run: |
          playwright install chromium
          sudo playwright install-deps chromium

      - name: Ejecutar scraper
        run: python scraper.py

      - name: Verificar archivos creados
        run: |
          echo "=== Buscando CSV ==="
          find . -name "*.csv" 2>/dev/null || echo "No se encontraron CSVs"

      - name: Guardar datos en repositorio
        run: |
          git config --global user.email "scraperbot@github.com"
          git config --global user.name "TennisScraperBot"
          git add *.csv
          git diff --staged --quiet || git commit -m 'Update tennis data'
          git push
