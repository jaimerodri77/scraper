name: Tennis Scraper Diario

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install pandas playwright playwright-stealth

      - name: Instalar Chromium
        run: |
          python -m playwright install chromium
          python -m playwright install-deps chromium

      - name: Ejecutar scraper diario de partidos
        run: python scraper_diario.py

      - name: Ejecutar scraper de jugadores
        run: python scraper.py

      - name: Extraer calendario de partidos del día
        run: python scraper_calendario.py

      - name: Verificar archivos creados
        run: |
          echo "=== Carpeta datos ==="
          ls -lh datos/ 2>/dev/null || echo "La carpeta datos NO existe"
          find . -name "*.csv" 2>/dev/null

      - name: Guardar datos en repositorio
        run: |
          git config --global user.email "scraperbot@github.com"
          git config --global user.name "TennisScraperBot"
          [ -f datos ] && rm datos
          mkdir -p datos
          git add --all datos/ || true
          if git diff --staged --quiet; then
            echo "Sin cambios nuevos."
            exit 0
          fi
          git commit -m "Update tennis data $(date +'%Y-%m-%d')"
          git push
