name: Tennis Scraper Diario

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias del sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y libwoff1 libopus0 libwebp6 libwebpdemux2 libenchant-2-2 libgudev-1.0-0 libsecret-1-0 libhyphen0 libgdk-pixbuf2.0-0 libegl1 libgles2 libevent-2.1-7

      - name: Instalar dependencias de Python
        run: |
          pip install pandas beautifulsoup4 playwright
          playwright install chromium
          playwright install-deps chromium

      - name: Ejecutar scraper
        run: python scraper.py

      - name: Guardar datos en repositorio
        run: |
          git config --global user.email scraperbot@github.com
          git config --global user.name TennisScraperBot
          git add *.csv
          git diff --staged --quiet || git commit -m 'Update tennis data'
          git push
