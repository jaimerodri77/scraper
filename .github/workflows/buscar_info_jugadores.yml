name: Buscar Info Jugadores

on:
  workflow_dispatch:
  schedule:
    - cron: '0 7 * * *'

permissions:
  contents: write

jobs:
  buscar-info:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install pandas playwright
          playwright install chromium

      - name: Ejecutar extractor de jugadores
        run: python extraer_jugadores_csv.py

      - name: Ejecutar buscador de info
        run: python buscar_info_jugadores.py

      - name: Mostrar archivos generados
        run: |
          echo "=== Archivos en carpeta datos ==="
          ls -la datos/
          echo "=== Primeras lineas del archivo ==="
          head -5 datos/jugadores_info.csv || echo "Archivo no existe"

      - name: Commit y Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A datos/
          git status
          git diff-index --quiet HEAD || (git commit -m "Actualizar informacion de jugadores" && git push)
