name: Extraer Jugadores CSV

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'

permissions:
  contents: write

jobs:
  extraer-jugadores:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install pandas

      - name: Ejecutar extractor de jugadores
        run: python extraer_jugadores_csv.py

      - name: Mostrar archivos generados
        run: |
          echo "=== Archivos en carpeta datos ==="
          ls -la datos/
          echo "=== Primeras lineas del archivo ==="
          head -5 datos/jugadores_pendientes.csv

      - name: Commit y Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A datos/
          git status
          git diff-index --quiet HEAD || (git commit -m "Actualizar jugadores pendientes" && git push)
