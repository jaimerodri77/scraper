name: Sofascore Daily Scraper

# Esto define cuándo se ejecuta. 
# En este ejemplo: Todos los días a las 00:00 UTC y cada vez que hagas un "push" manual.
on:
  schedule:
    - cron: '0 0 * * *' 
  workflow_dispatch: # Permite ejecutarlo manualmente desde la pestaña "Actions"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Instalar dependencias
        run: |
          pip install requests pyyaml

      - name: Ejecutar el scraper
        run: python test_scraper.py

      - name: Guardar y subir el CSV al repositorio
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add *.csv
          git commit -m "Actualización automática de datos Sofascore [skip ci]" || echo "No hay cambios para commit"
          git push
