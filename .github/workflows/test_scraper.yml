name: Sofascore Daily Scraper

on:
  schedule:
    - cron: '0 0 * * *' 
  workflow_dispatch:

# ESTA ES LA PARTE QUE DEBES AÑADIR
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Instalar dependencias
        run: |
          pip install requests pyyaml

      - name: Ejecutar el scraper
        run: python test_scraper.py

      - name: Guardar y subir el CSV al repositorio
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Actualización automática de datos Sofascore [skip ci]" || echo "No hay cambios para commit"
          git push

