name: Tennis Scraper Jugadores

on:
  schedule:
    # Corre a las 11:00 UTC diariamente (1 hora después del scraper de partidos)
    - cron: '0 11 * * *'
  workflow_dispatch:

jobs:
  scrape_jugadores:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install pandas playwright

      - name: Instalar Chromium
        run: |
          python -m playwright install chromium
          python -m playwright install-deps chromium

      - name: Verificar que existe el CSV de partidos
        run: |
          YEAR=$(date +'%Y')
          FILE="datos/tenis_${YEAR}.csv"
          if [ ! -f "$FILE" ]; then
            echo "❌ No se encontró el archivo de partidos: $FILE"
            echo "Asegúrate de que el scraper de partidos haya corrido primero."
            exit 1
          fi
          echo "✅ Archivo de partidos encontrado: $FILE"
          echo "Filas: $(wc -l < $FILE)"

      - name: Ejecutar scraper de jugadores
        run: python scraper_jugadores.py

      - name: Verificar archivos generados
        run: |
          echo "=== Carpeta datos ==="
          ls -lh datos/ 2>/dev/null || echo "La carpeta datos NO existe"
          YEAR=$(date +'%Y')
          FILE="datos/jugadores_${YEAR}.csv"
          if [ -f "$FILE" ]; then
            echo "✅ Jugadores CSV generado"
            echo "Filas totales: $(wc -l < $FILE)"
          else
            echo "⚠️ No se generó el archivo de jugadores"
          fi

      - name: Guardar datos en repositorio
        run: |
          git config --global user.email "scraperbot@github.com"
          git config --global user.name "TennisScraperBot"
          mkdir -p datos
          git add --all datos/ || true
          if git diff --staged --quiet; then
            echo "Sin cambios nuevos en jugadores."
            exit 0
          fi
          git commit -m "Update jugadores data $(date +'%Y-%m-%d')"
          git push
