name: Tennis Scraper Histórico 2025

on:
  workflow_dispatch:
    inputs:
      fecha:
        description: 'Fecha específica para debug (YYYY-MM-DD). Deja vacío para todo 2025.'
        required: false
        default: ''

jobs:
  scrape-historico:
    runs-on: ubuntu-latest
    timeout-minutes: 340

    permissions:
      contents: write

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          pip install pandas requests

      - name: Preparar carpeta de datos
        run: mkdir -p datos

      - name: Ejecutar scraper 2025
        env:
          PROXY_URL: ${{ secrets.PROXY_URL }}
          PROXY_TOKEN: ${{ secrets.PROXY_TOKEN }}
        run: |
          if [ -n "${{ github.event.inputs.fecha }}" ]; then
            python scraper_historico.py --fecha ${{ github.event.inputs.fecha }}
          else
            python scraper_historico.py
          fi

      - name: Guardado Final de Seguridad
        if: always()
        run: |
          git config --global user.email "scraperbot@github.com"
          git config --global user.name "TennisScraperBot"
          git add datos/*.csv || true
          if ! git diff --staged --quiet; then
            git commit -m "Final Sync 2025: $(date +'%Y-%m-%d %H:%M')"
            git pull --rebase origin main
            git push
          fi





