name: Tennis Scraper Histórico

on:
  workflow_dispatch:
    inputs:
      fecha:
        description: 'Fecha específica para debug (YYYY-MM-DD)'
        required: false
        default: ''

jobs:
  scrape-historico:
    runs-on: ubuntu-latest
    timeout-minutes: 340  # ~5.5 horas máximo (límite de GitHub Actions: 6h)

    permissions:
      contents: write

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install pandas playwright

      - name: Instalar Chromium
        run: |
          python -m playwright install chromium
          python -m playwright install-deps chromium

      - name: Restaurar CSV histórico previo (si existe en el repo)
        run: |
          mkdir -p datos
          if [ -f datos/tenis_historico.csv ]; then
            echo "CSV histórico encontrado, se continuará desde donde quedó."
          else
            echo "Sin CSV previo, se empieza desde cero."
          fi

      - name: Ejecutar scraper histórico
        run: |
          if [ -n "${{ github.event.inputs.fecha }}" ]; then
            echo "MODO DEBUG: ${{ github.event.inputs.fecha }}"
            python scraper_historico.py --fecha ${{ github.event.inputs.fecha }}
          else
            python scraper_historico.py
          fi

      - name: Verificar resultado
        run: |
          echo "=== Archivos en datos/ ==="
          ls -lh datos/
          echo "=== Líneas en CSV histórico ==="
          wc -l datos/tenis_historico.csv 2>/dev/null || echo "Archivo no encontrado"

      - name: Guardar progreso en repositorio
        if: always()  # Guardar aunque el job falle a mitad — para poder reanudar
        run: |
          git config --global user.email "scraperbot@github.com"
          git config --global user.name "TennisScraperBot"
          git add datos/tenis_historico.csv || true
          if git diff --staged --quiet; then
            echo "Sin cambios nuevos."
          else
            git commit -m "Histórico tenis: progreso $(date +'%Y-%m-%d %H:%M')"
            git push
          fi
