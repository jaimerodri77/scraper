name: Tennis Scraper Histórico 2025

on:
  workflow_dispatch:
    inputs:
      fecha:
        description: 'Fecha específica para debug (YYYY-MM-DD). Deja vacío para procesar el año 2025.'
        required: false
        default: ''

jobs:
  scrape-historico:
    runs-on: ubuntu-latest
    timeout-minutes: 340 

    permissions:
      contents: write

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          pip install pandas playwright
          python -m playwright install chromium
          python -m playwright install-deps chromium

      - name: Preparar carpeta de datos
        run: mkdir -p datos

      - name: Ejecutar scraper 2025
        run: |
          if [ -n "${{ github.event.inputs.fecha }}" ]; then
            echo "🚀 MODO PRUEBA: Procesando fecha específica ${{ github.event.inputs.fecha }}"
            python scraper_historico.py --fecha ${{ github.event.inputs.fecha }}
          else
            echo "📅 MODO HISTÓRICO: Procesando rango completo 2025"
            python scraper_historico.py
          fi

      - name: Guardar CSV en repositorio
        if: always()
        run: |
          git config --global user.email "scraperbot@github.com"
          git config --global user.name "TennisScraperBot"
          
          # 1. Agregar cambios
          git add datos/*.csv || true
          
          # 2. Verificar si hay cambios para hacer commit
          if git diff --staged --quiet; then
            echo "No hay cambios en el CSV."
            exit 0
          fi
          
          # 3. Hacer el commit localmente
          git commit -m "Update tenis 2025: $(date +'%Y-%m-%d %H:%M')"
          
          # 4. Sincronizar con la nube antes de subir (ESTO SOLUCIONA EL ERROR)
          # El rebase pone nuestros cambios encima de los cambios que haya hecho el bot diario
          git pull --rebase origin main
          
          # 5. Ahora sí, subir los cambios
          git push




